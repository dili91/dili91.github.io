# About Section
about_title: Whoami
about_profile_image: images/profile.jpeg
about_content: |
  My name is Andrea and I'm currently working as senior software engineer for TrueLayer.
  
  I dedicate most of my time at designing and building APIs and internal services,
  as well as DevOps tasks. The rest of my day goes to technical briefs, code reviews, mentoring and interviews.
  
  I'm a fluent `Java` developer, but I'm not obsessed with it. I see my coding skills as a tool to turn great ideas into amazing products and I'm very keen to expand my skillset on a daily basis.
  
  At TrueLayer I've been playing quite a lot with `C#/.NET Core` and `Rust` recently. I'm intrigued by `DevOps` and I've been working for a long time now with `AWS`,
  `Terraform` and `Kubernetes`.
  
  Over the last years I've been focussing in the payments business area, ranging from e-commerce to carrier billing to online banking.

  
content:
  - title: Experience
    layout: list
    content:
      - layout: left
        title: TrueLayer
        link: truelayer.com
        sub_title: Senior Software Engineer
        caption: April 2020 - Present
        description: |
          I initially joined the UK & Ireland connectivity team as a senior software engineer. My main resposibilities involved 
          connecting new banks to our platform and building internal services to collect user data about accounts and transactions or initiate
          payments via _Open Banking_ services. I dedicated a big chunk of my time to the migration of production services to a completely new Kubernetes cluster on the AWS cloud.

          In the last months I joined a product team which is responsibile of building a recurring payments product based on _Open Banking_ and UK Direct debits.
          After an initial phase mostly made of technical discovery, technical design and planning, i'm now more focussed on the building phase of our product.
          
          I mostly work in Rust, C# and with Kubernetes resources. In my _spare time_ I'm actively contributing to a Java SDK which will be made available in future to our customers 
          as an easy way to interact with our new payments APIs.
      - layout: left
        title: Onebip / DIMOCO
        link: https://dimoco.eu/carrierbilling/
        link_text: dimoco.eu
        sub_title: Devops, Senior Software Engineer
        caption: May 2019 - April 2020
        description: |
          Working from Milan for DIMOCO's carrier billing department, as software engineer in a QA and DevOps team.
          When I joined the company, the payments product team was fully committed at replacing a legacy payment infrastructure with a new one based on microservices,
          which aimed to be way more scalable and extensible than the previous one. 
          I was responsible of maintaining and evolving an internal testing infrastructure, meant to suport this transition with the help of end-to-end tests on
          mobile devices connected to physical servers across different countries in Europe. 
          
          During the last months of my experience I transitioned to the payments product team, where I implemented a translation layer so that our live customers
          could interact with the new infrastructure without any changes to their legacy integration.

          I mostly worked with Java on the product team and used Groovy and bash as scripting language when taking care of Devops tasks.
      - layout: left
        title: Vipera Plc / Fabrick
        link_text: fabrick.com
        link: https://www.fabrick.com/acquisition-of-vipera-plc/
        sub_title: Software Engineer, Technical lead
        caption: January 2017 - April May 2019
        description: |
          I joined Vipera as a backend engineer. I was mostly working on projects for retail and banking customers built on Vipera's
          banking platform based on Java OSGi. Though I was not part of the product team, I was constantly in touch with it as I had
          to know the product very well, and also take care of specific customers customizations (i.e. loyalty programs,
          ecommerce, proximity marketing) which required a deep understanding of our product's internals.

          in 2018 I accepted to transition to a technical lead position on a project for a banking customer in the UAE. I was working
          alongside a project manager and a business analyst, supervisioning the work of a team of 8 engineers, working both in Milan and remotely from India.
          Our objective was to replace the existing online banking platform with a new one based on Vipera's banking solution.

          It was my first experience as technical lead, and I had the chance to learn a lot both from a technical and human/soft-skill perspective.
          I really enjoyed exploring this new role and its associated responsibilities, both in the happy and the stressful times.
          
      - layout: left
        title: Codd&Date
        link: www.codd-date.com
        sub_title: Software Engineer
        caption: November 2013 - January 2017
        description: |
          My first working experience. I've been working for the first 3 months as intern, and I had the chance to experiment both
          on frontend and backend software development. It was a great opportunity for me to understand my desired career path.
          I got my hands dirty initially on mobile hybrid development, then I slowly transitioned to backend development first with 
          a bit of .NET and eventually Java. Here is where I started seeing live customer on the AWS platform and had fun solving 
          my first performance and scalability headaches with cloud services. Worked mainly for retail and banking customers.
