  - title: A Little More About Me
    layout: text
    content: |
      > If you feel like you're the dumbest person in the room, you're in the correct room.

      The above one is one of my favorite mantra: I love to sorround myself with smart and motivated people because it's always a learning and 
      humbling experience at the same time. This is exaclty what's happening in TrueLayer, where we created an amazing movement and an extremely ambitious mission which is 
      _Opening up finance_, that is streamline as much as we can the access to banking data and payments. 
      
      As mentioned in my intro I'm not scared at all by learning new languages or skills in general as long I can see motivation and commitment around me. 
      I see them as an investment and a way to train my curiosity. I love being part of a community, hanging around the office spaces and travelling - pandemic permitting.  
  
      In addition to what I do for TrueLayer I like taking care of extra projects in my extra time. I try to work on open source projects 
      whenever I can - some of my contributions are available on my Github profile.
      I've been recently helping a few small startups in Milan on either cloud infrastructure optimizations or with technical consultancy in general.

      When I'm not using my laptop I like doing sports, football, padel, ski and workouts being my favourites.
      I love living my city spaces either on my own or along with friends: cinema, parks, pubs, wineries and restaurants.
      I like listening to (a lot of) music, especially rock, blues and soul music. I'm a self-taught guitar player but i'm not planning to organize a concert anytime soon :) 

      I recently re-discovered the joy of reading and I try to read as much as I can during the year. 
      Below a few titles I've been (or I am) recently enjoying:
      - <a href="https://www.goodreads.com/book/show/53916142-a-life-on-our-planet">A Life on Our Planet</a>, David Attenborough
      - <a href="https://www.goodreads.com/book/show/6480781-open">Open</a>, Andre Agassi
      - <a href="https://www.goodreads.com/book/show/52647113-apropos-of-nothing">Apropos of Nothing</a>, Woody Allen
      - <a href="https://www.goodreads.com/book/show/34890015-factfulness">Factfulness</a>, Hans Rosling
      - <a href="https://www.goodreads.com/book/show/33600.Shantaram">Shantaram</a>, Gregory David Roberts
      - <a href="https://www.goodreads.com/book/show/39996759-a-philosophy-of-software-design">A Philosophy of Software Design</a>, John Ousterhout
      - <a href="https://www.goodreads.com/book/show/23463279-designing-data-intensive-applications">Designing Data-Intensive Applications</a>, Martin Kleppmann
      - <a href="https://www.goodreads.com/book/show/25550614-programming-rust">Programming Rust: Fast, Safe Systems Development</a>, Jim Blandy
      - <a href="https://www.goodreads.com/book/show/55730109-zero-to-production-in-rust">Zero To Production In Rust</a>, Luca Palmieri
      


