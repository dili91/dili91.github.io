        description: | 
          I attended Politecnico's Computering engineering course after high school. On my third and last year I converted an optional exam into 
          an internship of 3 months which I completed in Codd&Date. Soon after that I was offered a job and I decided to prioritize my 
          working experience over my studies. Eventually that move led to me not completing my last bachelor exams, but I'm fine with it.
